<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="./src/js/main.js" defer></script>
    <link rel="stylesheet" href="./src/style/style.css" />

    <link
      rel="shortcut icon"
      href="./src/assets/favicon.png"
      type="image/x-icon"
    />

    <title>Cook Easy | Recipe App</title>
  </head>
  <body>
    <main class="mobile-container" id="mobile-container">
      <header class="search">
        <h1 class="logo">
          <span class="n1">Cook</span> <span class="n2">Easy</span>
          <i class="ph-fill ph-cooking-pot"></i>
        </h1>
        <div class="search-input-group">
          <input
            type="text"
            id="search-term"
            placeholder="Search"
            aria-label="Campo de busca por receitas"
          />
          <button id="clear-search" aria-label="Limpar busca">
            <i class="ph ph-x"></i>
          </button>
        </div>
        <button id="search" aria-label="Buscar receitas">
          <lord-icon
            src="https://cdn.lordicon.com/xfftupfv.json"
            trigger="hover"
            colors="primary:#f77272"
            style="width: 25px; height: 25px"
          >
          </lord-icon>
        </button>

        <div class="toggle-switch">
          <label class="switch-label">
            <input type="checkbox" class="checkbox" />
            <span class="slider"></span>
          </label>
        </div>
      </header>

      <section class="fav-container carousel">
        <h3>Favorite Meals <span id="fav-count">(0)</span></h3>
        <ul class="fav-meals" id="fav-meals"></ul>
      </section>

      <section class="quick-filters" aria-label="Sugestões de busca">
        <button class="quick-chip" data-term="chicken">Chicken</button>
        <button class="quick-chip" data-term="beef">Beef</button>
        <button class="quick-chip" data-term="pasta">Pasta</button>
        <button class="quick-chip" data-term="fish">Fish</button>
      </section>

      <section class="recent-searches">
        <h4>Buscas recentes</h4>
        <ul id="recent-searches-list"></ul>
      </section>

      <section class="meals-content">
        <ul class="meals" id="meals" aria-live="polite"></ul>
      </section>
    </main>

    <section class="popup-info-container hidden" id="meal-info-popup">
      <div class="popup" role="dialog" aria-modal="true" aria-labelledby="meal-title">
        <button id="close-popup" class="close-popup" aria-label="Fechar pop-up">
          <i class="ph-fill ph-x-square"></i>
        </button>
        <button id="share-meal" class="share-meal" aria-label="Compartilhar receita">
          <i class="ph ph-share-network"></i>
        </button>

        <div class="meal-popup" id="meal-info"></div>
      </div>
    </section>

    <footer>
      <p>
        Desenvolvido por <span>C</span>arlos <span>C</span>unha <span>J</span>r.
        &copy; 2023
      </p>
    </footer>
    <script src="https://cdn.lordicon.com/bhenfmcm.js"></script>
  </body>
</html>
